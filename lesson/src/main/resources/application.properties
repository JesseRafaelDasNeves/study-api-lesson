spring.application.name=lesson

spring.datasource.url=jdbc:postgresql://localhost:5432/${POSTGRES_LESSON_DB}
spring.datasource.username=${POSTGRES_LESSON_USER}
spring.datasource.password=${POSTGRES_LESSON_PASSWORD}

spring.flyway.locations=classpath:bd/migrations

# Content Generator (AI proxy)
content-generator.auth-url=https://platform-homologx.senior.com.br/t/senior.com.br/bridge/1.0/anonymous/rest/platform/authentication/actions/loginWithKey
content-generator.completions-url=https://platform-homologx.senior.com.br/t/senior-x/platform/iassist/api/latest/completions
content-generator.access-key=${CONTENT_GENERATOR_ACCESS_KEY:}
content-generator.secret=${CONTENT_GENERATOR_SECRET:}
content-generator.tenant-name=${CONTENT_GENERATOR_TENANT_NAME:}
content-generator.timeout-seconds=20

# File extraction — tamanho m\u00e1ximo do arquivo aceito pelo extrator (em MB)
file-extraction.max-size-mb=20

# Multipart — alinhado com o limite acima (margem extra para overhead da requisi\u00e7\u00e3o)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB
